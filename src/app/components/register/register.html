<div class="auth-page">

  <button
    class="theme-toggle"
    (click)="themeService.toggleTheme()"
    [title]="themeService.isDarkMode() ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
    <span *ngIf="themeService.isDarkMode()">☀️</span>
    <span *ngIf="!themeService.isDarkMode()">🌙</span>
  </button>

  <div class="auth-card">
    <div class="auth-header">
      <img src="/Image/logo.png" alt="RBB Logo" class="auth-logo">
      <h1>Create Account</h1>
      <p>Join Rastriya Banijya Bank today</p>
    </div>

    <div *ngIf="success" class="success-message">
      <span>✓</span>
      <p>Account created! Redirecting to login…</p>
    </div>

    <form (ngSubmit)="register()" class="auth-form" *ngIf="!success">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input
          type="text"
          id="name"
          [(ngModel)]="name"
          name="name"
          placeholder="Enter your full name"
          required />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Enter your email"
          required />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Create a password"
            required />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="Confirm your password"
            required />
        </div>
      </div>

      <div *ngIf="error" class="error-message">
        ⚠ {{ error }}
      </div>

      <button type="submit" class="submit-btn" [disabled]="loading">
        {{ loading ? 'Creating Account…' : 'Create Account' }}
      </button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a routerLink="/login">Sign in here</a></p>
    </div>
  </div>

  <footer class="page-footer">
    <p>&copy; {{ currentYear }} Rastriya Banijya Bank — Protected by 256-bit SSL 🔒</p>
  </footer>

</div>
