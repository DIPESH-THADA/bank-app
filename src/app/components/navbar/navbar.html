<nav class="navbar">
  <div class="navbar-content">

    <!-- Left: menu toggle + brand -->
    <div class="navbar-left">
      <button class="menu-toggle" *ngIf="showMenuToggle" (click)="onMenuToggle()" aria-label="Toggle menu">
      </button>
      <a routerLink="/dashboard" class="navbar-brand">
        <span class="brand-icon">🏦</span>
        <span class="brand-name">Nexus Bank</span>
      </a>
    </div>

    <!-- Center: navigation links -->
    <div class="navbar-nav">
      <a routerLink="/dashboard" routerLinkActive="active">
        <span class="nav-icon">📊</span>
        <span>Dashboard</span>
      </a>
      <a routerLink="/accounts" routerLinkActive="active">
        <span class="nav-icon">💳</span>
        <span>Accounts</span>
      </a>
      <a routerLink="/transactions" routerLinkActive="active">
        <span class="nav-icon">📋</span>
        <span>Transactions</span>
      </a>
      <a routerLink="/transfer" routerLinkActive="active">
        <span class="nav-icon">💸</span>
        <span>Transfer</span>
      </a>
    </div>

    <!-- Right: dark mode toggle + user info -->
    <div class="navbar-actions">
      <button class="theme-toggle" (click)="themeService.toggleTheme()"
        [title]="themeService.isDarkMode() ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
        <span *ngIf="themeService.isDarkMode()">☀️</span>
        <span *ngIf="!themeService.isDarkMode()">🌙</span>
      </button>

      <div class="navbar-user" *ngIf="currentUser">
        <img [src]="currentUser.avatar" [alt]="currentUser.name" class="avatar">
        <div class="user-dropdown">
          <p class="user-name">{{ currentUser.name }}</p>
          <button class="logout-btn" (click)="logout()">Logout</button>
        </div>
      </div>
    </div>

  </div>
</nav>
