<div class="page-container">

  <app-navbar [showMenuToggle]="true" (menuToggle)="toggleSidebar()"></app-navbar>

  <div class="page-wrapper">
    <app-sidebar [isOpen]="sidebarOpen"></app-sidebar>

    <div class="content-area">
      <main class="main-content">

        <div class="page-header">
          <div>
            <h2>Transfer Funds</h2>
            <p>Send money quickly and securely between accounts</p>
          </div>
        </div>

        <div class="transfer-card">

          <div *ngIf="success" class="success-message">
            <span class="success-icon">✓</span>
            <div>
              <p class="success-title">Transfer Successful!</p>
              <p class="success-sub">Your transfer has been processed.</p>
            </div>
          </div>

          <form (ngSubmit)="transfer()" *ngIf="!success" class="transfer-form">

            <div class="form-row">
              <div class="form-group">
                <label for="fromAccount">From Account</label>
                <select id="fromAccount" [(ngModel)]="fromAccount" name="fromAccount" required>
                  <option value="" disabled selected>Select account</option>
                  <option value="acc1">Checking — **** 4582</option>
                  <option value="acc2">Savings — **** 9123</option>
                </select>
              </div>

              <div class="form-group">
                <label for="toAccount">To Account</label>
                <select id="toAccount" [(ngModel)]="toAccount" name="toAccount" required>
                  <option value="" disabled selected>Select recipient</option>
                  <option value="rec1">John Smith — 123456789</option>
                  <option value="rec2">Jane Doe — 987654321</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="amount">Amount ($)</label>
              <input
                type="number"
                id="amount"
                [(ngModel)]="amount"
                name="amount"
                placeholder="0.00"
                step="0.01"
                required>
            </div>

            <div class="form-group">
              <label for="description">Note (Optional)</label>
              <input
                type="text"
                id="description"
                [(ngModel)]="description"
                name="description"
                placeholder="Add a note to this transfer">
            </div>

            <div *ngIf="error" class="error-message">
              ⚠ {{ error }}
            </div>

            <button type="submit" class="transfer-btn" [disabled]="loading">
              {{ loading ? 'Processing…' : 'Transfer Now' }}
            </button>

          </form>
        </div>

      </main>
      <app-footer></app-footer>
    </div>
  </div>

</div>
